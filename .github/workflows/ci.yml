name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build deps (airsim needs numpy+msgpack)
        run: pip install numpy msgpack-rpc-python

      - name: Build airsim wheel
        run: pip wheel --no-build-isolation --no-deps --wheel-dir /tmp/wheelhouse airsim

      - name: Install dependencies
        run: pip install --find-links /tmp/wheelhouse -r requirements-dev.txt

      - name: Mypy
        run: mypy .

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps (airsim needs numpy+msgpack)
        run: pip install numpy msgpack-rpc-python

      - name: Build airsim wheel
        run: pip wheel --no-build-isolation --no-deps --wheel-dir /tmp/wheelhouse airsim

      - name: Install dependencies
        run: pip install --find-links /tmp/wheelhouse -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build deps (airsim needs numpy+msgpack)
        run: pip install numpy msgpack-rpc-python

      - name: Build airsim wheel
        run: pip wheel --no-build-isolation --no-deps --wheel-dir /tmp/wheelhouse airsim

      - name: Install dependencies
        run: pip install --find-links /tmp/wheelhouse -r requirements.txt

      - name: Run smoke test
        run: python smoke_test.py
